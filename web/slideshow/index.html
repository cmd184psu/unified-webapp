<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Slideshow</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="display" data-controls-pos="bottom">
    <!-- Image layer -->
    <img id="slide-img" alt="">

    <!-- Semi-translucent overlay: two children → space-between works correctly -->
    <div id="overlay">

      <!-- Top bar: subject label + image counter + debug readout + hamburger -->
      <div id="top-bar">
        <div id="top-left">
          <span id="subject-label"></span>
          <span id="image-counter"></span>
        </div>
        <span id="debug-display" hidden></span>
        <button id="btn-hamburger" aria-label="Settings">&#9776;</button>
      </div>

      <!-- Controls bar: nav buttons + image counter stacked vertically -->
      <div id="controls-bar">
        <div class="ctrl-row">
          <div class="ctrl-group">
            <button id="btn-prev-subject" title="Previous subject">&#9198;</button>
            <button id="btn-prev" title="Previous image">&#8249;</button>
          </div>

          <div class="ctrl-group center">
            <button id="btn-play-pause" title="Play / Pause">&#9646;&#9646;</button>
          </div>

          <div class="ctrl-group">
            <button id="btn-next" title="Next image">&#8250;</button>
            <button id="btn-next-subject" title="Next subject">&#9197;</button>
          </div>

          <!-- Music controls: hidden until collections available -->
          <div id="music-controls" hidden>
            <span class="music-icon" title="Audio">&#9835;</span>
            <button id="btn-music-stop" title="Stop audio">&#9632;</button>
            <button id="btn-music-play" title="Play audio">&#9654;</button>
            <button id="btn-music-next" title="Next collection">&gt;&gt;</button>
            <span id="music-label"></span>
          </div>
        </div>
      </div><!-- /controls-bar -->

    </div><!-- /overlay -->

    <!-- Scrim: closes settings panel when tapped outside it -->
    <div id="settings-scrim" hidden></div>

    <!-- Settings panel -->
    <div id="settings-panel" hidden>
      <div class="panel-header">
        <h3>Settings</h3>
        <button id="btn-close-settings" aria-label="Close settings">&#10005;</button>
      </div>

      <label>
        Mode
        <select id="sel-mode">
          <option value="kenburns">Ken Burns</option>
          <option value="panscan">Pan &amp; Scan</option>
          <option value="static">Static</option>
        </select>
      </label>

      <label>
        Seconds per image
        <input id="inp-interval" type="number" min="1" max="300">
      </label>

      <label class="checkbox-label">
        <input id="chk-shuffle" type="checkbox"> Shuffle subjects
      </label>

      <label>
        Theme
        <select id="sel-theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </label>

      <label>
        Controls position
        <select id="sel-controls-pos">
          <option value="bottom">Bottom</option>
          <option value="top">Top</option>
        </select>
      </label>

      <label class="checkbox-label">
        <input id="chk-debug" type="checkbox"> Debug timer
      </label>

      <hr class="panel-divider">

      <div id="server-stamp" class="server-stamp"></div>

      <hr class="panel-divider">

      <div class="shortcuts-help">
        <h4>Keyboard shortcuts</h4>
        <dl>
          <dt><kbd>&#8592;</kbd> <kbd>&#8594;</kbd></dt><dd>Prev / next image</dd>
          <dt><kbd>Space</kbd></dt><dd>Play / pause slideshow</dd>
          <dt><kbd>Enter</kbd></dt><dd>Play / stop music</dd>
          <dt><kbd>Esc</kbd></dt><dd>Close this menu</dd>
        </dl>
      </div>

    </div>

  </div><!-- /display -->

  <audio id="audio-player" preload="auto"></audio>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
