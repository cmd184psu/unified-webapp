<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Obsidianoid</title>
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="app" data-mode="notes">
    <header id="topbar">
      <div id="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-label="Obsidianoid" xmlns="http://www.w3.org/2000/svg">
          <polygon points="12,2 22,8 22,16 12,22 2,16 2,8" stroke="var(--color-primary)" stroke-width="1.5" fill="none"/>
          <polygon points="12,6 18,9.5 18,14.5 12,18 6,14.5 6,9.5" fill="var(--color-primary)" opacity="0.25"/>
          <circle cx="12" cy="12" r="2.5" fill="var(--color-primary)"/>
        </svg>
        <span>Obsidianoid</span>
      </div>
      <div id="mode-switcher">
        <button id="btn-mode-notes" class="active" title="Notes view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Notes
        </button>
        <button id="btn-mode-threads" title="Threads view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
          Threads
        </button>
      </div>

      <div id="topbar-actions">
        <span id="note-title"></span>
        <button id="btn-autosave" title="Toggle auto-save">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Auto-save</span>
        </button>
        <button id="btn-toggle-mode" title="Toggle edit/preview" disabled>
          <svg id="icon-preview" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="mode-label">Preview</span>
        </button>
        <button id="btn-save" title="Save note" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span>Save</span>
        </button>
        <button id="btn-new-note" title="New note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>New</span>
        </button>
        <button id="btn-git-sync" title="Commit and push vault changes" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          <span>Sync</span>
        </button>
        <button id="btn-hamburger" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </header>

    <!-- Theme panel (toggled by hamburger) -->
    <div id="theme-panel" hidden>
      <p>Theme</p>
      <div id="theme-options"></div>
    </div>

    <div id="workspace">
      <!-- Resizable sidebar -->
      <aside id="sidebar">
        <div id="sidebar-header">
          <span>Files</span>
          <select id="vault-selector" aria-label="Switch vault"></select>
          <input id="search-input" type="search" placeholder="Filter notes…" aria-label="Filter notes" />
        </div>
        <div id="file-tree" role="tree" aria-label="Vault file tree">
          <div class="tree-loading skeleton-text"></div>
          <div class="tree-loading skeleton-text" style="width:70%"></div>
          <div class="tree-loading skeleton-text" style="width:55%"></div>
        </div>
      </aside>

      <!-- Drag handle -->
      <div id="resize-handle" aria-hidden="true"></div>

      <!-- Content area -->
      <main id="content-area">
        <div id="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-faint)" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <h3>No note selected</h3>
          <p>Click a file in the sidebar to open it.</p>
        </div>
        <div id="preview-pane" hidden></div>
        <textarea id="editor-pane" hidden spellcheck="true" aria-label="Note editor"></textarea>
      </main>
    </div>

    <!-- Threads view -->
    <div id="threads-view">
      <div id="threads-grid"></div>
    </div>

    <!-- Toast notification -->
    <div id="toast" role="status" aria-live="polite"></div>

    <!-- New Note Dialog -->
    <dialog id="new-note-dialog">
      <form method="dialog" id="new-note-form">
        <h2>New Note</h2>
        <label for="new-note-path">Path (relative to vault root)</label>
        <input id="new-note-path" type="text" placeholder="folder/My Note.md" required />
        <div class="dialog-actions">
          <button type="button" id="btn-cancel-new">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>
    </dialog>

    <!-- Git Sync Dialog -->
    <dialog id="git-sync-dialog">
      <form method="dialog" id="git-sync-form">
        <h2>Sync Vault</h2>
        <label for="git-commit-msg">Commit message</label>
        <input id="git-commit-msg" type="text" placeholder="obsidianoid sync" />
        <div class="dialog-actions">
          <button type="button" id="btn-cancel-sync">Cancel</button>
          <button type="submit" class="btn-primary">Commit &amp; Push</button>
        </div>
      </form>
    </dialog>
  </div>

  <script src="/js/threads.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
